name: CI для JavaScript

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Загружаем код из репозитория
    - uses: actions/checkout@v4

    # 2. Устанавливаем Node.js (нужен для запуска JS)
    - name: Установка Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    # 3. Запускаем тест
    - name: Запуск тестов
      run: npm test
